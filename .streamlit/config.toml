# SENTINEL — Streamlit Configuration
# This file is auto-copied to ~/.streamlit/config.toml on deployment

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#00ff41"
backgroundColor = "#050a0e"
secondaryBackgroundColor = "#0d161c"
textColor = "#c9d6df"
font = "monospace"
