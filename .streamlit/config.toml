# SENTINEL — Streamlit Configuration
# This file is auto-copied to ~/.streamlit/config.toml on deployment

[server]
headless = true
port = 8501
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#6366f1"
backgroundColor = "#0c0f1a"
secondaryBackgroundColor = "#131725"
textColor = "#e2e8f0"
font = "sans serif"
