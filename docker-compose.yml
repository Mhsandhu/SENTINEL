version: "3.9"

services:
  sentinel:
    build: .
    container_name: sentinel-app
    ports:
      - "8501:8501"
    volumes:
      # Persist database and vault across restarts
      - sentinel_db:/app/database
      - sentinel_vault:/app/vault_storage
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true

volumes:
  sentinel_db:
  sentinel_vault:
